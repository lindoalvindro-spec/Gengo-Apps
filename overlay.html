<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gengo Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div class="overlay-container drag-area" id="overlayContainer">
    <div class="header">
      <div class="drag-handle">⋮⋮</div>
      <button class="close-btn" id="closeOverlayBtn" title="Close Overlay">✕</button>
    </div>
    <div class="content" id="overlayText">Waiting for translation...</div>
    <div class="resize-handle">◢</div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
