<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gengo — Game Live Translator</title>
  <meta name="description" content="Live translate game text using screen capture and OCR" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Custom Title Bar -->
  <header class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <svg class="app-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="1" width="12" height="14" fill="#071a0e"/><rect x="3" y="2" width="10" height="12" fill="#0d3320"/><rect x="4" y="3" width="8" height="10" fill="#10b981"/><rect x="5" y="4" width="1" height="8" fill="#10b981"/><rect x="6" y="4" width="5" height="1" fill="#6ee7b7"/><rect x="10" y="4" width="1" height="2" fill="#10b981"/><rect x="6" y="5" width="1" height="2" fill="#34d399"/><rect x="7" y="5" width="1" height="1" fill="#6ee7b7"/><rect x="8" y="5" width="1" height="2" fill="#34d399"/><rect x="9" y="5" width="1" height="1" fill="#6ee7b7"/><rect x="6" y="7" width="5" height="1" fill="#6ee7b7"/><rect x="7" y="8" width="1" height="2" fill="#34d399"/><rect x="8" y="8" width="1" height="1" fill="#6ee7b7"/><rect x="9" y="8" width="1" height="2" fill="#6ee7b7"/><rect x="10" y="8" width="1" height="1" fill="#34d399"/><rect x="6" y="10" width="1" height="1" fill="#10b981"/></svg>
      <span class="app-title">Gengo</span>
      <span class="app-badge live-indicator">LIVE</span>
    </div>
    <div class="titlebar-right">
      <button class="pin-btn active" id="pinBtn" title="Always on Top">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 17v5"/><path d="M9 2h6l-1 7h4l-7 8V9H7l2-7z"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="minimizeBtn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="maximizeBtn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="titlebar-btn close-btn" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Language Selection -->
    <section class="lang-section" id="langSection">
      <div class="lang-picker">
        <label class="lang-label">Source</label>
        <select class="lang-select" id="sourceLang">
          <option value="jpn" data-translate="ja">🇯🇵 JP Japanese</option>
          <option value="eng" data-translate="en">🇬🇧 EN English</option>
          <option value="chi_sim" data-translate="zh-CN">🇨🇳 CN Chinese (Simplified)</option>
          <option value="chi_tra" data-translate="zh-TW">🇹🇼 TW Chinese (Traditional)</option>
          <option value="kor" data-translate="ko">🇰🇷 KR Korean</option>
        </select>
      </div>
      <div class="lang-arrow">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
      <div class="lang-picker">
        <label class="lang-label">Target</label>
        <select class="lang-select" id="targetLang">
          <option value="id">🇮🇩 ID Indonesian</option>
          <option value="en">🇬🇧 EN English</option>
          <option value="ja">🇯🇵 JP Japanese</option>
          <option value="ko">🇰🇷 KR Korean</option>
          <option value="zh-CN">🇨🇳 CN Chinese (Simplified)</option>
        </select>
      </div>

    </section>

    <!-- Text Boxes -->
    <section class="boxes-section" id="boxesSection">
      <div class="text-box" id="ocrBox">
        <div class="box-header">
          <span class="box-icon">📝</span>
          <span class="box-title">Captured Text</span>
          <button class="copy-btn" id="copyOcr" title="Copy text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
        <div class="box-content" id="ocrContent">
          <p class="placeholder-text">Captured text will appear here...</p>
        </div>
      </div>
      <div class="text-box" id="translateBox">
        <div class="box-header">
          <span class="box-icon">🌍</span>
          <span class="box-title">Translation</span>
          <button class="copy-btn" id="copyTranslation" title="Copy text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>
        </div>
        <div class="box-content" id="translateContent">
          <p class="placeholder-text">Translation will appear here...</p>
        </div>
      </div>
    </section>

    <!-- Translation History -->
    <section class="history-section" id="historySection">
      <div class="history-header" id="historyHeader">
        <span class="history-icon">📜</span>
        <span class="history-title">History</span>
        <span class="history-count" id="historyCount">0</span>
        <button class="history-toggle" id="historyToggle">▼</button>
        <button class="history-clear" id="historyClear" title="Clear All">×</button>
      </div>
      <div class="history-body" id="historyBody">
        <p class="history-empty">No translation history yet...</p>
      </div>
    </section>

    <!-- Capture Preview (hidden by default, shown when capturing) -->
    <section class="preview-section" id="previewSection" style="display:none;">
      <div class="preview-header">
        <span>📸 Capture Preview</span>
        <button class="preview-close" id="previewClose">✕</button>
      </div>
      <canvas id="previewCanvas"></canvas>
    </section>

    <!-- Controls -->
    <section class="controls-section" id="controlsSection">
      <div class="controls-row">
        <button class="ctrl-btn primary" id="selectRegionBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3H3v3M18 3h3v3M6 21H3v-3M18 21h3v-3"/>
            <rect x="8" y="8" width="8" height="8" rx="1" stroke-dasharray="2 2"/>
          </svg>
          <span>Select Region</span>
        </button>
        <button class="ctrl-btn success" id="startBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <span>Start</span>
        </button>
        <button class="ctrl-btn danger" id="stopBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
          <span>Stop</span>
        </button>
        <button class="ctrl-btn accent" id="captureOnceBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <span>Capture Once</span>
        </button>
        <button class="ctrl-btn" id="toggleOverlayBtn" style="margin-left: auto;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <span>Show Overlay</span>
        </button>
      </div>

      <div class="preset-row">
        <label class="preset-label">Region Preset</label>
        <select class="lang-select preset-select" id="presetSelect">
          <option value="">-- No preset --</option>
        </select>
        <button class="ctrl-btn" id="savePresetBtn" disabled title="Save current region">💾</button>
        <button class="ctrl-btn danger" id="deletePresetBtn" disabled title="Delete selected preset">🗑</button>
      </div>
      <div class="interval-row">
        <label class="interval-label">Interval</label>
        <input type="range" class="interval-slider" id="intervalSlider" min="1" max="10" value="3" step="1" />
        <span class="interval-value" id="intervalValue">3s</span>
      </div>
    </section>

    <!-- Status Bar -->
    <footer class="status-bar" id="statusBar">
      <div class="status-left">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Ready</span>
      </div>
      <div class="status-right">
        <span class="status-info" id="ocrEngine">OCR: Tesseract.js</span>
        <div class="status-divider-vertical"></div>
        <span class="status-info" id="apiInfo">API: Google Translate</span>
      </div>
    </footer>
  </main>

  <!-- Region Selection Overlay (fullscreen, hidden by default) -->
  <div class="region-overlay" id="regionOverlay" style="display:none;">
    <div class="region-instructions">
      <span>🎯 Click and drag to select the capture region</span>
      <button class="region-cancel" id="regionCancel">Cancel (ESC)</button>
    </div>
    <canvas id="regionCanvas"></canvas>
  </div>

  <!-- Source Selection Modal -->
  <div class="modal-overlay" id="sourceModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Select Screen Source</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="sourceList">
        <!-- Sources will be populated here -->
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
